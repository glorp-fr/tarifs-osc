<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin — OUTSCALE Estimateur</title>
<link rel="icon" type="image/png" href="/assets/favicon.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">
<style>
.adm-hdr{background:var(--os-blue-dark);border-bottom:3px solid var(--os-orange);position:sticky;top:0;z-index:50}
.adm-hdr-inner{padding:0 20px;height:56px;display:flex;align-items:center;gap:12px}
.adm-main{max-width:1400px;margin:0 auto;padding:20px}
.tab-bar{display:flex;gap:2px;background:rgba(0,0,0,.2);border-radius:8px;padding:3px}
.atab{padding:5px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;color:rgba(255,255,255,.65);transition:all .15s;border:none;background:none;font-family:inherit;white-space:nowrap}
.atab:hover{color:#fff;background:rgba(255,255,255,.1)}
.atab.on{color:var(--os-blue-dark);background:#fff}
.cat-section{padding:7px 12px 4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--os-blue);background:var(--os-blue-pale);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.cat-inp{width:88px;background:var(--panel);border:1px solid var(--border);border-radius:5px;padding:4px 6px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);transition:border-color .15s}
.cat-inp:focus{outline:none;border-color:var(--os-blue);box-shadow:0 0 0 2px rgba(0,83,134,.1)}
.cat-inp.dirty{border-color:var(--os-orange);background:var(--os-orange-pale)}
.cat-inp.fresh{border-color:var(--ok);background:var(--ok-bg)}
.diff-add{background:#dcfce7;color:#166534}
.diff-del{background:#fee2e2;color:#991b1b}
.diff-chg{background:#fef9c3;color:#713f12}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:36px 40px;width:360px;box-shadow:0 8px 32px rgba(0,83,134,.08)}
.sb-btn.on{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.45);color:#fff;font-weight:600}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState, useEffect, useMemo, useRef, useCallback} = React;

const API = '/api';
const TOKEN_KEY = 'osc:token'; // clé partagée avec l'appli principale

/* ── Helpers ── */
function getToken() { return localStorage.getItem(TOKEN_KEY)||""; }

function parseTokenRole(token) {
  try {
    const p = JSON.parse(atob(token.split('.')[1]));
    return (p.exp > Date.now()/1000) ? p.role : null;
  } catch { return null; }
}

async function apiFetch(path, opts={}) {
  const token = getToken();
  const r = await fetch(API+path, {
    ...opts,
    headers: {'Content-Type':'application/json', 'Authorization':`Bearer ${token}`, ...(opts.headers||{})},
  });
  if (r.status === 401 || r.status === 403) { localStorage.removeItem(TOKEN_KEY); window.location.reload(); }
  if (!r.ok) { const e = await r.json().catch(()=>({error:`HTTP ${r.status}`})); throw new Error(e.error||`HTTP ${r.status}`); }
  return r.json();
}

function fE(v, d=0) { return (v||0).toLocaleString("fr-FR",{minimumFractionDigits:d,maximumFractionDigits:d})+" EUR"; }
function fp(v, d=4) { return parseFloat((v||0).toFixed(d)); }
const FLAG = {FR:"🇫🇷",US:"🇺🇸",JP:"🇯🇵"};
const ROLE_CLS   = {admin:"b-oks", outscale:"b-comp", prospect:"b-bsu"};
const ROLE_LABEL = {admin:"Admin", outscale:"Outscale", prospect:"Prospect"};

/* ── LoginPage ── */
function LoginPage({onLogin}) {
  const [pwd, setPwd]   = useState("");
  const [err, setErr]   = useState("");
  const [busy, setBusy] = useState(false);

  const submit = async e => {
    e.preventDefault();
    setBusy(true); setErr("");
    try {
      const {token} = await fetch(API+'/auth/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({password:pwd}),
      }).then(async r => { const d=await r.json(); if(!r.ok) throw new Error(d.error); return d; });
      if (parseTokenRole(token) !== 'admin') { setErr("Ce compte n'a pas les droits administrateur."); setBusy(false); return; }
      localStorage.setItem(TOKEN_KEY, token);
      onLogin();
    } catch(e) {
      setErr(e.message||"Erreur de connexion");
    } finally { setBusy(false); }
  };

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{width:48,height:48,background:"var(--os-blue-dark)",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px",color:"#fff",fontSize:22}}>⚙</div>
          <div style={{fontWeight:700,fontSize:18,color:"var(--os-blue-dark)"}}>Administration</div>
          <div style={{fontSize:12,color:"var(--text-muted)",marginTop:4}}>OUTSCALE Cloud Estimateur</div>
        </div>
        <form onSubmit={submit}>
          <div style={{marginBottom:14}}>
            <div className="lbl">Mot de passe admin</div>
            <input type="password" className="inp" value={pwd} onChange={e=>setPwd(e.target.value)}
              placeholder="••••••••" autoFocus style={{fontSize:15}}/>
          </div>
          {err && <div className="err-banner" style={{marginBottom:12}}>{err}</div>}
          <button type="submit" className="btn blue" disabled={busy||!pwd} style={{width:"100%",justifyContent:"center",padding:"9px 0",fontSize:14}}>
            {busy?"Connexion...":"Se connecter"}
          </button>
        </form>
        <div style={{marginTop:16,fontSize:11,color:"var(--text-muted)",textAlign:"center"}}>
          <a href="/" style={{color:"var(--text-muted)"}}>← Retour à l'estimateur</a>
        </div>
      </div>
    </div>
  );
}

/* ── Composant ligne prix (catalogue) ── */
function PriceRow({label, bk, arr, regionIds, edits, onEdit, saved, avails, availKey, onToggleAvail, deletable, onDelete}) {
  return (
    <div style={{display:"grid",gridTemplateColumns:`minmax(220px,2fr) repeat(${arr.length},108px)`,background:"var(--panel)",borderBottom:"1px solid var(--border)"}}>
      <div style={{padding:"6px 10px",color:"var(--text-dim)",fontSize:12.5,alignSelf:"center",display:"flex",alignItems:"center",gap:4}}>
        <span style={{flex:1}}>{label}</span>
        {deletable && <button onClick={onDelete} title="Supprimer ce service"
          style={{background:"none",border:"none",cursor:"pointer",color:"#dc2626",fontSize:16,lineHeight:1,padding:"0 4px",fontWeight:700,opacity:.6}}
          onMouseEnter={e=>e.target.style.opacity=1} onMouseLeave={e=>e.target.style.opacity=.6}>×</button>}
      </div>
      {arr.map((v, i) => {
        const pk = `${bk}__${i}`;
        const isDirty  = edits[pk] !== undefined;
        const wasSaved = !isDirty && saved[pk] !== undefined;
        const display  = isDirty ? edits[pk] : (v===0?"0":String(fp(v,4)));
        const curAvail = avails[availKey] ? avails[availKey][i] !== false : true;
        return (
          <div key={i} style={{padding:"3px 5px",display:"flex",flexDirection:"column",gap:2}}>
            <button
              onClick={() => onToggleAvail(availKey, i, !curAvail)}
              title={curAvail ? `Désactiver ${regionIds[i]}` : `Activer ${regionIds[i]}`}
              style={{
                fontSize:9,padding:"1px 5px",borderRadius:3,border:"1px solid",cursor:"pointer",
                fontWeight:700,fontFamily:"inherit",whiteSpace:"nowrap",transition:"all .12s",
                background: curAvail ? "rgba(22,163,74,.1)" : "rgba(0,0,0,.04)",
                borderColor: curAvail ? "rgba(22,163,74,.45)" : "var(--border,#e2e8f0)",
                color: curAvail ? "#166534" : "var(--text-muted)",
              }}>
              {curAvail ? "ON" : "OFF"}
            </button>
            <input className={"cat-inp"+(isDirty?" dirty":wasSaved?" fresh":"")}
              value={display}
              onChange={e => curAvail && onEdit(pk, e.target.value)}
              title={`${regionIds[i]}: ${v}`}
              readOnly={!curAvail}
              style={!curAvail ? {opacity:.35,cursor:"not-allowed"} : {}}/>
          </div>
        );
      })}
    </div>
  );
}

/* ── Formulaire ajout de service ── */
function AddServiceRow({regions, onAdd, placeholder="Nom du service", withIops=false}) {
  const nR = regions.length;
  const [name,   setName]   = useState("");
  const [prices, setPrices] = useState(() => Array(nR).fill(""));
  const [iops,   setIops]   = useState(() => Array(nR).fill(""));
  const setP = (i, v) => setPrices(a => { const r=[...a]; r[i]=v; return r; });
  const setI = (i, v) => setIops(a => { const r=[...a]; r[i]=v; return r; });
  const handleAdd = () => {
    if (!name.trim()) return;
    onAdd(name.trim(), prices.map(p => parseFloat(p)||0), withIops ? iops.map(p => parseFloat(p)||0) : null);
    setName(""); setPrices(Array(nR).fill("")); setIops(Array(nR).fill(""));
  };
  return (
    <div style={{display:"grid",gridTemplateColumns:`minmax(220px,2fr) repeat(${nR},108px) auto`,background:"var(--os-blue-pale,#eef4fb)",borderBottom:"1px solid var(--border)"}}>
      <div style={{padding:"4px 10px",display:"flex",alignItems:"center"}}>
        <input className="inp" value={name} onChange={e=>setName(e.target.value)}
          placeholder={placeholder} style={{fontSize:12,padding:"3px 7px",flex:1}}
          onKeyDown={e=>e.key==="Enter"&&handleAdd()}/>
      </div>
      {regions.map((r, i) => (
        <div key={i} style={{padding:"3px 5px",display:"flex",flexDirection:"column",gap:2}}>
          <input className="cat-inp" value={prices[i]} onChange={e=>setP(i,e.target.value)} placeholder="0" title={r.id} style={{fontSize:11}}/>
          {withIops && <input className="cat-inp" value={iops[i]} onChange={e=>setI(i,e.target.value)} placeholder="IOPS" style={{fontSize:11,borderColor:"rgba(0,83,134,.3)"}}/>}
        </div>
      ))}
      <div style={{padding:"4px 8px",display:"flex",alignItems:"center"}}>
        <button className="btn blue" onClick={handleAdd} disabled={!name.trim()} style={{fontSize:11,padding:"4px 10px"}}>+ Ajouter</button>
      </div>
    </div>
  );
}

/* ── Formulaire ajout génération vCore ── */
function AddVcoreRow({regions, onAdd}) {
  const nR = regions.length;
  const PERF = ["medium","high","highest"];
  const PERF_LABELS = {medium:"medium (p3)", high:"high (p2)", highest:"highest (p1)"};
  const [name,   setName]   = useState("");
  const [prices, setPrices] = useState(() => Object.fromEntries(PERF.map(p=>[p,Array(nR).fill("")])));
  const setP = (perf,i,v) => setPrices(prev=>({...prev,[perf]:prev[perf].map((x,j)=>j===i?v:x)}));
  const handleAdd = () => {
    if (!name.trim()) return;
    const ps = Object.fromEntries(PERF.map(p=>[p, prices[p].map(v=>parseFloat(v)||0)]));
    onAdd(name.trim(), ps);
    setName(""); setPrices(Object.fromEntries(PERF.map(p=>[p,Array(nR).fill("")])));
  };
  return (
    <div style={{background:"var(--os-blue-pale,#eef4fb)",borderBottom:"1px solid var(--border)"}}>
      <div style={{display:"grid",gridTemplateColumns:`minmax(220px,2fr) repeat(${nR},108px) auto`}}>
        <div style={{padding:"4px 10px",display:"flex",alignItems:"center",gap:6}}>
          <input className="inp" value={name} onChange={e=>setName(e.target.value)}
            placeholder="ID génération (ex: v8)" style={{fontSize:12,padding:"3px 7px",flex:1}}
            onKeyDown={e=>e.key==="Enter"&&handleAdd()}/>
          <button className="btn blue" onClick={handleAdd} disabled={!name.trim()} style={{fontSize:11,padding:"4px 10px",whiteSpace:"nowrap"}}>+ Ajouter</button>
        </div>
        {regions.map(r=><div key={r.id} style={{padding:"2px 5px",textAlign:"center",fontSize:9,color:"var(--text-muted)",alignSelf:"center"}}>{FLAG[r.flag]||""} {r.short}</div>)}
        <div/>
      </div>
      {PERF.map(perf=>(
        <div key={perf} style={{display:"grid",gridTemplateColumns:`minmax(220px,2fr) repeat(${nR},108px) auto`,borderTop:"1px solid var(--border)"}}>
          <div style={{padding:"2px 10px 2px 28px",fontSize:11,color:"var(--text-dim)",alignSelf:"center"}}>↳ {PERF_LABELS[perf]}</div>
          {regions.map((r,i)=>(
            <div key={i} style={{padding:"2px 5px"}}>
              <input className="cat-inp" value={prices[perf][i]} onChange={e=>setP(perf,i,e.target.value)} placeholder="0" style={{fontSize:11}}/>
            </div>
          ))}
          <div/>
        </div>
      ))}
    </div>
  );
}

/* ── CatalogTab ── */
function CatalogTab() {
  const [data,    setData]    = useState(null);
  const [regions, setRegions] = useState([]);
  const [edits,   setEdits]   = useState({});
  const [saved,   setSaved]   = useState({});
  const [avails,  setAvails]  = useState({});
  const [dirty,   setDirty]   = useState(false);
  const [comment, setComment] = useState("");
  const [status,  setStatus]  = useState("idle");
  const [errMsg,  setErrMsg]  = useState("");

  useEffect(() => {
    Promise.all([apiFetch('/catalog'), apiFetch('/regions')])
      .then(([cat, reg]) => {
        setData(cat);
        setRegions((reg.regions||reg).filter(r=>r.active!==false));
        // Init avails from _availability or derive from prices
        const a = cat._availability ? {...cat._availability} : {};
        for (const [n, arr] of Object.entries(cat.gpu||{})) {
          if (!a[`gpu.${n}`] && arr.some(v=>v===0)) a[`gpu.${n}`] = arr.map(v=>v>0);
        }
        for (const [n, arr] of Object.entries(cat.oks||{})) {
          if (!a[`oks.${n}`] && arr.some(v=>v===0)) a[`oks.${n}`] = arr.map(v=>v>0);
        }
        for (const [n, s] of Object.entries(cat.storage||{})) {
          if (!a[`storage.${n}`] && (s.gb||[]).some(v=>v===0)) a[`storage.${n}`] = (s.gb||[]).map(v=>v>0);
        }
        for (const [n, l] of Object.entries(cat.lic||{})) {
          if (!a[`lic.${n}`] && (l.price||[]).some(v=>v===0)) a[`lic.${n}`] = (l.price||[]).map(v=>v>0);
        }
        for (const [n, arr] of Object.entries(cat.oos||{})) {
          if (!a[`oos.${n}`] && Array.isArray(arr) && arr.some(v=>v===0)) a[`oos.${n}`] = arr.map(v=>v>0);
        }
        for (const [gen, perfs] of Object.entries(cat.vcore||{})) {
          const hArr = perfs.high || [];
          if (!a[`vcore.${gen}`] && hArr.some(v=>v===0)) a[`vcore.${gen}`] = hArr.map(v=>v>0);
        }
        for (const bk of ['hdl_1gbps','hdl_10gbps','hdl_setup']) {
          if (!a[bk] && (cat[bk]||[]).some(v=>v===0)) a[bk] = (cat[bk]||[]).map(v=>v>0);
        }
        setAvails(a);
      })
      .catch(e => setErrMsg(e.message));
  }, []);

  const setE = (k, v) => setEdits(e => ({...e, [k]:v}));
  const dirtyCount = Object.keys(edits).length;
  const regionIds  = regions.map(r => r.id);

  const toggleAvail = (availKey, ri, newVal) => {
    setAvails(prev => {
      const curArr = prev[availKey] || Array(regions.length).fill(true);
      const newArr = [...curArr];
      newArr[ri] = newVal;
      return {...prev, [availKey]: newArr};
    });
    setDirty(true);
  };

  const deleteService = (cat, name) => {
    if (!confirm(`Supprimer "${name}" du catalogue ?`)) return;
    setData(prev => {
      const nc = JSON.parse(JSON.stringify(prev));
      const node = cat === 'storage' ? nc.storage : (cat === 'lic' ? nc.lic : nc[cat]);
      delete node[name];
      return nc;
    });
    const ak = `${cat}.${name}`;
    setAvails(prev => { const a={...prev}; delete a[ak]; return a; });
    const pfxs = cat === 'storage'
      ? [`stor_gb__${name}__`, `stor_iops__${name}__`]
      : [`${cat}__${name}__`];
    setEdits(prev => {
      const e={...prev};
      for (const k of Object.keys(e)) if (pfxs.some(p=>k.startsWith(p))) delete e[k];
      return e;
    });
    setDirty(true);
  };

  const addService = (cat, name, prices, iopsArr) => {
    if (!name) return;
    setData(prev => {
      const nc = JSON.parse(JSON.stringify(prev));
      if      (cat === 'gpu')     nc.gpu[name] = prices;
      else if (cat === 'oks')     nc.oks[name] = prices;
      else if (cat === 'storage') nc.storage[name] = {gb: prices, iops: iopsArr || Array(prices.length).fill(0)};
      else if (cat === 'lic')     nc.lic[name] = {base:"h", price: prices};
      else if (cat === 'oos')     nc.oos[name] = prices;
      return nc;
    });
    const avail = prices.map(v => v > 0);
    if (avail.some(v => !v)) setAvails(prev => ({...prev, [`${cat}.${name}`]: avail}));
    setDirty(true);
  };

  const addVcore = (name, perfsObj) => {
    if (!name) return;
    setData(prev => {
      const nc = JSON.parse(JSON.stringify(prev));
      nc.vcore[name] = perfsObj;
      return nc;
    });
    const avail = (perfsObj.high||[]).map(v => v > 0);
    if (avail.some(v => !v)) setAvails(prev => ({...prev, [`vcore.${name}`]: avail}));
    setDirty(true);
  };

  const deleteVcore = (gen) => {
    if (!confirm(`Supprimer la génération CPU "${gen}" et tous ses niveaux de performance ?`)) return;
    setData(prev => {
      const nc = JSON.parse(JSON.stringify(prev));
      delete nc.vcore[gen];
      return nc;
    });
    setAvails(prev => { const a={...prev}; delete a[`vcore.${gen}`]; return a; });
    setEdits(prev => {
      const e={...prev};
      for (const k of Object.keys(e)) if (k.startsWith(`vcore__${gen}__`)) delete e[k];
      return e;
    });
    setDirty(true);
  };

  const buildPayload = () => {
    const nc = JSON.parse(JSON.stringify(data));
    for (const [k, v] of Object.entries(edits)) {
      const parts = k.split("__"); const val = parseFloat(v); if (isNaN(val)) continue;
      try {
        if      (parts[0]==="ram")         nc.ram[+parts[1]]=val;
        else if (parts[0]==="ded_fee")     nc.ded_fee[+parts[1]]=val;
        else if (parts[0]==="vcore")       nc.vcore[parts[1]][parts[2]][+parts[3]]=val;
        else if (parts[0]==="gpu")         nc.gpu[parts[1]][+parts[2]]=val;
        else if (parts[0]==="oks")         nc.oks[parts[1]][+parts[2]]=val;
        else if (parts[0]==="stor_gb")     nc.storage[parts[1]].gb[+parts[2]]=val;
        else if (parts[0]==="stor_iops")   nc.storage[parts[1]].iops[+parts[2]]=val;
        else if (parts[0]==="oos")         nc.oos[parts[1]][+parts[2]]=val;
        else if (parts[0]==="vpn")         nc.vpn[+parts[1]]=val;
        else if (parts[0]==="nat")         nc.nat[+parts[1]]=val;
        else if (parts[0]==="lbu")         nc.lbu[+parts[1]]=val;
        else if (parts[0]==="eip")         nc.eip[+parts[1]]=val;
        else if (parts[0]==="dl_setup")    nc.dl_setup[+parts[1]]=val;
        else if (parts[0]==="dl_1g")       nc.dl_1gbps[+parts[1]]=val;
        else if (parts[0]==="dl_10g")      nc.dl_10gbps[+parts[1]]=val;
        else if (parts[0]==="hdl_setup")   nc.hdl_setup[+parts[1]]=val;
        else if (parts[0]==="hdl_1g")      nc.hdl_1gbps[+parts[1]]=val;
        else if (parts[0]==="hdl_10g")     nc.hdl_10gbps[+parts[1]]=val;
        else if (parts[0]==="lic")         nc.lic[parts[1]].price[+parts[2]]=val;
        else if (parts[0]==="const_gricap")nc.gpu_ri_cap=val;
        else if (parts[0]==="const_ded")   nc.dedicated_surcharge=val;
        else if (parts[0]==="const_hpm")   nc.hours_per_month=val;
      } catch {}
    }
    nc._availability = {...avails};
    return nc;
  };

  const save = async () => {
    if (!comment.trim()) { setErrMsg("Un commentaire est obligatoire."); return; }
    setStatus("saving"); setErrMsg("");
    try {
      const payload = buildPayload();
      payload._comment = comment;
      await apiFetch('/catalog', {method:'PUT', body:JSON.stringify(payload)});
      const saved_payload = buildPayload();
      setData(saved_payload);
      setAvails(saved_payload._availability || {});
      setSaved({...edits}); setEdits({}); setComment(""); setDirty(false);
      setStatus("ok"); setTimeout(()=>setStatus("idle"), 4000);
    } catch(e) { setErrMsg(e.message); setStatus("err"); }
  };

  if (errMsg && !data) return <div className="err-banner">{errMsg}</div>;
  if (!data) return <div style={{padding:20,color:"var(--text-muted)"}}>Chargement...</div>;

  const rh = () => (
    <div style={{display:"grid",gridTemplateColumns:`minmax(220px,2fr) repeat(${regions.length},108px)`,background:"var(--os-blue-dark)",padding:"6px 0"}}>
      <div style={{padding:"0 10px",fontSize:10,fontWeight:600,color:"rgba(255,255,255,.5)",textTransform:"uppercase",letterSpacing:".06em",alignSelf:"center"}}>Service</div>

            {label:"Plafond RI GPU (%)", bk:"const_gricap",  val:(data.gpu_ri_cap??0.30)},
          ].map(c => {

/* ── FormulasTab ── */
function FormulasTab() {
  const [data,    setData]    = useState(null);
  const [dirty,   setDirty]   = useState(false);
  const [comment, setComment] = useState("");
  const [status,  setStatus]  = useState("idle");
  const [errMsg,  setErrMsg]  = useState("");

  useEffect(() => {
    apiFetch('/formulas').then(d => setData(d)).catch(e => setErrMsg(e.message));
  }, []);

  const upd = (idx, field, val) => {
    setData(d => {
      const engs = [...(d.engagements||[])];
      engs[idx] = {...engs[idx], [field]:val};
      return {...d, engagements:engs};
    });
    setDirty(true);
  };

  const addRow = () => {
    setData(d => ({...d, engagements:[...(d.engagements||[]), {id:`custom-${Date.now()}`,label:"Nouvel engagement",discount:0,active:true,applies_to:["cpu","ram","gpu"]}]}));
    setDirty(true);
  };

  const toggleApplies = (idx, key) => {
    const cur = (data.engagements[idx].applies_to) || ["cpu","ram","gpu"];
    const next = cur.includes(key) ? cur.filter(k=>k!==key) : [...cur, key];
    upd(idx, "applies_to", next);
  };

  const delRow = idx => {
    if (!confirm("Supprimer cet engagement ?")) return;
    setData(d => ({...d, engagements:(d.engagements||[]).filter((_,i)=>i!==idx)}));
    setDirty(true);
  };

  const save = async () => {
    if (!comment.trim()) { setErrMsg("Un commentaire est obligatoire."); return; }
    setStatus("saving"); setErrMsg("");
    try {
      await apiFetch('/formulas', {method:'PUT', body:JSON.stringify({...data, _comment:comment})});
      setComment(""); setDirty(false);
      setStatus("ok"); setTimeout(()=>setStatus("idle"),4000);
    } catch(e) { setErrMsg(e.message); setStatus("err"); }
  };

  if (errMsg && !data) return <div className="err-banner">{errMsg}</div>;
  if (!data) return <div style={{padding:20,color:"var(--text-muted)"}}>Chargement...</div>;

  const engs = data.engagements||[];

  return (
    <div className="fade-in">
      <div className="card" style={{marginBottom:14,padding:"12px 16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:15,color:"var(--os-blue-dark)"}}>Formules d'engagement RI</div>
            <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2}}>
              {data._meta && `v${data._meta.version} — ${data._meta.updated_at?.slice(0,10)}`}
            </div>
          </div>
          <input className="inp" style={{maxWidth:300}} placeholder="Commentaire obligatoire…" value={comment} onChange={e=>setComment(e.target.value)}/>
          <button className="btn orange" disabled={!dirty||status==="saving"} onClick={save}>
            {status==="saving"?"Sauvegarde...":"Sauvegarder"}
          </button>
          <button className="btn ghost" onClick={addRow}>+ Ajouter</button>
        </div>
        {status==="ok"  && <div className="ok-banner"  style={{marginTop:10}}>Formules sauvegardées.</div>}
        {errMsg         && <div className="err-banner" style={{marginTop:10}}>{errMsg}</div>}
      </div>

      <div className="card" style={{overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 2fr 120px 160px 80px 60px",background:"var(--os-blue-dark)",padding:"8px 12px",gap:8}}>
          {["ID","Libellé","Remise %","S'applique à","Actif",""].map((h,i)=>(
            <div key={i} style={{fontSize:10,fontWeight:600,color:"rgba(255,255,255,.6)",textTransform:"uppercase",letterSpacing:".06em"}}>{h}</div>
          ))}
        </div>
        {engs.map((e, idx) => {
          const at = e.applies_to || ["cpu","ram","gpu"];
          return (
          <div key={idx} style={{display:"grid",gridTemplateColumns:"1fr 2fr 120px 160px 80px 60px",padding:"6px 12px",gap:8,borderBottom:"1px solid var(--border)",alignItems:"center"}}
            onMouseEnter={ev=>ev.currentTarget.style.background="var(--panel-2)"}
            onMouseLeave={ev=>ev.currentTarget.style.background=""}>
            <input className="inp mono" style={{fontSize:12,padding:"4px 8px"}} value={e.id}
              onChange={ev=>upd(idx,"id",ev.target.value)}/>
            <input className="inp" style={{fontSize:13,padding:"4px 8px"}} value={e.label}
              onChange={ev=>upd(idx,"label",ev.target.value)}/>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <input type="number" className="inp mono" style={{fontSize:13,padding:"4px 8px"}} min={0} max={1} step={0.01}
                value={e.discount??e.d??0} onChange={ev=>upd(idx,"discount",parseFloat(ev.target.value)||0)}/>
              <span style={{fontSize:12,color:"var(--ok)",fontWeight:600,minWidth:36}}>
                {Math.round((e.discount??e.d??0)*100)}%
              </span>
            </div>
            <div style={{display:"flex",gap:4}}>
              {["cpu","ram","gpu"].map(k => (
                <button key={k} onClick={()=>toggleApplies(idx,k)}

                    background: at.includes(k) ? "var(--os-blue)" : "transparent",

              <option value="1">Oui</option><option value="0">Non</option>
            </select>
            <button className="btn xs ghost danger" onClick={()=>delRow(idx)}>✕</button>

        })}

    </div>
  );
}

  };

  const save = async () => {

      await apiFetch('/regions', {method:'PUT', body:JSON.stringify({...data, _comment:comment})});
      setComment(""); setDirty(false);
      setStatus("ok"); setTimeout(()=>setStatus("idle"),4000);
    } catch(e) { setErrMsg(e.message); setStatus("err"); }

          </button>
          <button className="btn ghost" onClick={addRow}>+ Ajouter</button>
        </div>
        {status==="ok"  && <div className="ok-banner"  style={{marginTop:10}}>Régions sauvegardées.</div>}

      </div>
      <div className="warn-banner" style={{marginBottom:14}}>

            style={{display:"grid",gridTemplateColumns:"32px 60px 60px 1fr 2fr 80px 40px",padding:"6px 12px",gap:8,
              borderBottom:"1px solid var(--border)",alignItems:"center",

/* ── HistoryTab ── */
function HistoryTab() {
  const [list,     setList]     = useState([]);
  const [filter,   setFilter]   = useState("");
  const [loading,  setLoading]  = useState(true);
  const [diffSnap, setDiffSnap] = useState(null);
  const [diffData, setDiffData] = useState(null);
  const [errMsg,   setErrMsg]   = useState("");

  const load = useCallback(() => {
    setLoading(true);
    apiFetch('/history'+(filter?`?kind=${filter}`:'')).then(d=>{setList(d);setLoading(false);}).catch(e=>{setErrMsg(e.message);setLoading(false);});
  }, [filter]);

  useEffect(()=>{ load(); }, [load]);

  const viewDiff = async snap => {
    try {
      const [snapData, currentData] = await Promise.all([
        apiFetch(`/history/${snap.id}`),
        apiFetch(`/${snap.kind}`),
      ]);
      setDiffSnap(snap);
      setDiffData({snapshot: snapData.data, current: currentData});
    } catch(e) { setErrMsg(e.message); }
  };

  const restore = async snap => {
    if (!confirm(`Restaurer le snapshot ${snap.id} (${snap.kind}) ?\n\nLa version courante sera sauvegardée automatiquement avant restauration.`)) return;
    try {
      await apiFetch(`/history/${snap.id}/restore`, {method:'POST', body:JSON.stringify({author:'admin'})});
      alert("Restauration effectuée.");
      load();
    } catch(e) { setErrMsg(e.message); }
  };

  const del = async snap => {
    if (!confirm(`Supprimer le snapshot ${snap.id} ?`)) return;
    try { await apiFetch(`/history/${snap.id}`, {method:'DELETE'}); load(); }
    catch(e) { setErrMsg(e.message); }
  };

  const kindBadge = k => ({catalog:"#dbeafe",formulas:"#ede9fe",regions:"#d1fae5"}[k]||"#e5e7eb");
  const kindColor = k => ({catalog:"#1e4d8c",formulas:"#5b21b6",regions:"#065f46"}[k]||"#374151");

  const DiffView = ({snap, snap_data, current}) => {
    const flattenObj = (obj, prefix="") => {
      const result = {};
      for (const [k,v] of Object.entries(obj||{})) {
        if (k.startsWith("_")) continue;
        const key = prefix?`${prefix}.${k}`:k;
        if (typeof v==="object"&&!Array.isArray(v)&&v!==null) Object.assign(result, flattenObj(v,key));
        else result[key] = JSON.stringify(v);
      }
      return result;
    };
    const snapFlat = flattenObj(snap_data);
    const currFlat = flattenObj(current);
    const allKeys  = [...new Set([...Object.keys(snapFlat),...Object.keys(currFlat)])].sort();
    const changes  = allKeys.filter(k => snapFlat[k]!==currFlat[k]);

    return (
      <div className="card" style={{marginTop:14}}>
        <div style={{padding:"12px 16px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontWeight:700,color:"var(--os-blue-dark)"}}>Diff — {snap.id}</div>
            <div style={{fontSize:11,color:"var(--text-muted)"}}>{changes.length} différence{changes.length!==1?"s":""} vs version courante</div>
          </div>
          <button className="btn sm ghost" onClick={()=>setDiffSnap(null)}>✕ Fermer</button>
        </div>
        {changes.length===0
          ? <div className="ok-banner" style={{margin:12}}>Aucune différence — ce snapshot est identique à la version courante.</div>
          : <div style={{overflowY:"auto",maxHeight:400}} className="scroll">
            <table className="pvt">
              <thead><tr><th>Clé</th><th>Snapshot</th><th>Courant</th></tr></thead>
              <tbody>{changes.map(k=>(
                <tr key={k} className="dr">
                  <td className="mono" style={{fontSize:11}}>{k}</td>
                  <td className="mono diff-del" style={{fontSize:11}}>{snapFlat[k]??<em>absent</em>}</td>
                  <td className="mono diff-add" style={{fontSize:11}}>{currFlat[k]??<em>absent</em>}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>}
      </div>
    );
  };

  return (
    <div className="fade-in">
      <div className="card" style={{marginBottom:14,padding:"12px 16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <div style={{fontWeight:700,fontSize:15,color:"var(--os-blue-dark)"}}>Historique des modifications</div>
          <div style={{display:"flex",gap:4}}>
            {[{k:"",l:"Tous"},{k:"catalog",l:"Catalogue"},{k:"formulas",l:"Formules"},{k:"regions",l:"Régions"}].map(f=>(
              <button key={f.k} className={"btn xs"+(filter===f.k?" blue":"")} onClick={()=>setFilter(f.k)}>{f.l}</button>
            ))}
          </div>
          <button className="btn xs ghost" onClick={load} style={{marginLeft:"auto"}}>↺ Actualiser</button>
        </div>
        {errMsg && <div className="err-banner" style={{marginTop:10}}>{errMsg}</div>}
      </div>

      {loading
        ? <div style={{padding:20,color:"var(--text-muted)"}}>Chargement...</div>
        : list.length===0
          ? <div className="info-banner">Aucun snapshot.</div>
          : <div className="card" style={{overflow:"hidden"}}>
            <div style={{display:"grid",gridTemplateColumns:"170px 80px 1fr 100px 200px",background:"var(--os-blue-dark)",padding:"8px 12px",gap:8}}>
              {["Date","Type","Commentaire","Auteur","Actions"].map((h,i)=>(
                <div key={i} style={{fontSize:10,fontWeight:600,color:"rgba(255,255,255,.6)",textTransform:"uppercase",letterSpacing:".06em"}}>{h}</div>
              ))}
            </div>
            {list.map(snap=>(
              <div key={snap.id}
                style={{display:"grid",gridTemplateColumns:"170px 80px 1fr 100px 200px",padding:"8px 12px",gap:8,
                  borderBottom:"1px solid var(--border)",alignItems:"center"}}
                onMouseEnter={e=>e.currentTarget.style.background="var(--panel-2)"}
                onMouseLeave={e=>e.currentTarget.style.background=""}>
                <span className="mono" style={{fontSize:11,color:"var(--text-dim)"}}>{snap.at?.replace("T"," ").replace("Z","")}</span>
                <span style={{display:"inline-block",padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:600,
                  background:kindBadge(snap.kind),color:kindColor(snap.kind)}}>{snap.kind}</span>
                <span style={{fontSize:12,color:"var(--text-dim)"}}>{snap.comment||<em style={{color:"var(--text-muted)"}}>—</em>}</span>
                <span style={{fontSize:11,color:"var(--text-muted)"}}>{snap.author}</span>
                <div style={{display:"flex",gap:4}}>
                  <button className="btn xs ghost" onClick={()=>viewDiff(snap)}>Comparer</button>
                  <button className="btn xs ghost" onClick={()=>restore(snap)}>Restaurer</button>
                  <button className="btn xs ghost danger" onClick={()=>del(snap)}>✕</button>
                </div>
              </div>
            ))}
          </div>}

      {diffSnap && diffData && (
        <DiffView snap={diffSnap} snap_data={diffData.snapshot} current={diffData.current}/>
      )}
    </div>
  );
}

/* ── UsersTab ── */
function UsersTab() {
  const [users,   setUsers]   = useState([]);
  const [loading, setLoading] = useState(true);
  const [errMsg,  setErrMsg]  = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const [form,    setForm]    = useState({username:"", password:"", role:"prospect", company:""});
  const [formErr, setFormErr] = useState("");
  const [resetId, setResetId] = useState(null);
  const [newPwd,  setNewPwd]  = useState("");

  const load = () => {
    setLoading(true);
    apiFetch('/users').then(d => { setUsers(d); setLoading(false); }).catch(e => { setErrMsg(e.message); setLoading(false); });
  };

  useEffect(load, []);

  const createUser = async e => {
    e.preventDefault(); setFormErr("");
    try {
      const u = await apiFetch('/users', {method:'POST', body:JSON.stringify(form)});
      setUsers(prev => [...prev, u]);
      setForm({username:"", password:"", role:"prospect", company:""});
      setShowAdd(false);
    } catch(e) { setFormErr(e.message); }
  };

  const changeRole = async (id, role) => {
    try {
      await apiFetch(`/users/${id}`, {method:'PATCH', body:JSON.stringify({role})});
      setUsers(prev => prev.map(u => u.id===id ? {...u, role} : u));
    } catch(e) { setErrMsg(e.message); }
  };

  const resetPassword = async id => {
    if (!newPwd || newPwd.length < 6) { setErrMsg("Mot de passe trop court (min 6 caractères)"); return; }
    try {
      await apiFetch(`/users/${id}`, {method:'PATCH', body:JSON.stringify({password:newPwd})});
      setResetId(null); setNewPwd(""); alert("Mot de passe mis à jour.");
    } catch(e) { setErrMsg(e.message); }
  };

  const deleteUser = async id => {
    if (!confirm("Supprimer cet utilisateur et toutes ses simulations ?")) return;
    try {
      await apiFetch(`/users/${id}`, {method:'DELETE'});
      setUsers(prev => prev.filter(u => u.id !== id));
    } catch(e) { setErrMsg(e.message); }
  };

  return (
    <div className="fade-in">
      <div className="card" style={{marginBottom:14,padding:"12px 16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:15,color:"var(--os-blue-dark)"}}>Gestion des utilisateurs</div>
            <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2}}>{users.length} utilisateur{users.length!==1?"s":""}</div>
          </div>
          <button className="btn orange" onClick={()=>setShowAdd(!showAdd)}>+ Nouvel utilisateur</button>
          <button className="btn xs ghost" onClick={load} style={{marginLeft:4}}>↺</button>
        </div>
        {errMsg && <div className="err-banner" style={{marginTop:10}}>{errMsg}</div>}

        {showAdd && (
          <form onSubmit={createUser} style={{marginTop:14,padding:"12px 16px",background:"var(--panel-2)",borderRadius:8,border:"1px solid var(--border)"}}>
            <div style={{fontWeight:600,fontSize:13,color:"var(--os-blue-dark)",marginBottom:10}}>Créer un utilisateur</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 130px",gap:10,alignItems:"end"}}>
              <div>
                <div className="lbl">Identifiant</div>
                <input className="inp" value={form.username} onChange={e=>setForm(f=>({...f,username:e.target.value}))} placeholder="prenom.nom" required/>
              </div>
              <div>
                <div className="lbl">Mot de passe initial</div>
                <input type="password" className="inp" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))} placeholder="min 6 caractères" required/>
              </div>
              <div>
                <div className="lbl">Société <span style={{fontWeight:400,color:"var(--text-muted)"}}>(optionnel)</span></div>
                <input className="inp" value={form.company} onChange={e=>setForm(f=>({...f,company:e.target.value}))} placeholder="Nom de l'entreprise"/>
              </div>
              <div>
                <div className="lbl">Rôle</div>
                <select className="sel" value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))}>
                  <option value="prospect">Prospect</option>
                  <option value="outscale">Outscale</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
            </div>
            {formErr && <div className="err-banner" style={{marginTop:8}}>{formErr}</div>}
            <div style={{display:"flex",gap:8,marginTop:12}}>
              <button type="submit" className="btn orange">Créer</button>
              <button type="button" className="btn ghost" onClick={()=>setShowAdd(false)}>Annuler</button>
            </div>
          </form>
        )}
      </div>

      {loading ? <div style={{padding:20,color:"var(--text-muted)"}}>Chargement...</div> : (
        <div className="card" style={{overflow:"hidden"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 120px 140px 120px 120px 180px",background:"var(--os-blue-dark)",padding:"8px 12px",gap:8}}>
            {["Identifiant","Société","Rôle","Créé le","Créé par","ID","Actions"].map((h,i)=>(
              <div key={i} style={{fontSize:10,fontWeight:600,color:"rgba(255,255,255,.6)",textTransform:"uppercase",letterSpacing:".06em"}}>{h}</div>
            ))}
          </div>
          {users.length===0 && (
            <div style={{padding:"24px 12px",textAlign:"center",color:"var(--text-muted)",fontSize:13}}>
              Aucun utilisateur. Créez le premier compte ci-dessus.
            </div>
          )}
          {users.map(u => (
            <div key={u.id}
              style={{display:"grid",gridTemplateColumns:"1fr 1fr 120px 140px 120px 120px 180px",padding:"8px 12px",gap:8,
                borderBottom:"1px solid var(--border)",alignItems:"center"}}
              onMouseEnter={e=>e.currentTarget.style.background="var(--panel-2)"}
              onMouseLeave={e=>e.currentTarget.style.background=""}>
              <span style={{fontWeight:600,fontSize:13}}>{u.username}</span>
              <span style={{fontSize:12,color:"var(--text-muted)"}}>{u.company||<span style={{opacity:.4}}>—</span>}</span>
              <div>
                <select className="sel" style={{fontSize:11,padding:"3px 6px"}} value={u.role}
                  onChange={e=>changeRole(u.id, e.target.value)}>
                  <option value="prospect">Prospect</option>
                  <option value="outscale">Outscale</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
              <span className="mono" style={{fontSize:11,color:"var(--text-muted)"}}>{u.created_at?.slice(0,10)||"—"}</span>
              <span style={{fontSize:11,color:"var(--text-muted)"}}>{u.created_by||"—"}</span>
              <span className="mono" style={{fontSize:10,color:"var(--text-muted)"}}>{u.id}</span>
              <div style={{display:"flex",gap:4,alignItems:"center"}}>
                {resetId===u.id ? (
                  <>
                    <input className="inp mono" type="password" style={{fontSize:11,padding:"3px 6px",width:90}}
                      value={newPwd} onChange={e=>setNewPwd(e.target.value)} placeholder="nouveau mdp" autoFocus/>
                    <button className="btn xs" onClick={()=>resetPassword(u.id)}>OK</button>
                    <button className="btn xs ghost" onClick={()=>{setResetId(null);setNewPwd("");}}>✕</button>
                  </>
                ) : (
                  <>
                    <button className="btn xs ghost" onClick={()=>{setResetId(u.id);setNewPwd("");}}>MDP</button>
                    <button className="btn xs ghost danger" onClick={()=>deleteUser(u.id)}>Supprimer</button>
                  </>
                )}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── LogsTab ── */
function LogsTab() {
  const [lines,        setLines]        = useState([]);
  const [total,        setTotal]        = useState(0);
  const [loading,      setLoading]      = useState(true);
  const [errMsg,       setErrMsg]       = useState("");
  const [search,       setSearch]       = useState("");
  const [actionFilter, setActionFilter] = useState("");
  const [limit,        setLimit]        = useState(500);
  const [autoRefresh,  setAutoRefresh]  = useState(false);
  const [expanded,     setExpanded]     = useState(null);
  const timerRef = useRef(null);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const data = await apiFetch(`/logs?lines=${limit}`);
      setLines(data.lines || []);
      setTotal(data.total || 0);
      setErrMsg("");
    } catch(e) { setErrMsg(e.message); }
    finally { setLoading(false); }
  }, [limit]);

  useEffect(() => { load(); }, [load]);

  useEffect(() => {
    clearInterval(timerRef.current);
    if (autoRefresh) timerRef.current = setInterval(load, 10000);
    return () => clearInterval(timerRef.current);
  }, [autoRefresh, load]);

  const parseLine = raw => {
    const p = raw.split(' | ');
    return { ts: p[0]?.trim()||'', ip: p[1]?.trim()||'', user: p[2]?.trim()||'',
             action: p[3]?.trim()||'', detail: p[4]?.trim()||'' };
  };

  const ACTION_COLORS = {
    LOGIN_OK:         {bg:'#dcfce7',color:'#166534'},
    LOGIN_FAIL:       {bg:'#fee2e2',color:'#991b1b'},
    REGISTER:         {bg:'#dbeafe',color:'#1e40af'},
    USER_CREATE:      {bg:'#e0f2fe',color:'#075985'},
    USER_UPDATE:      {bg:'#fef9c3',color:'#713f12'},
    USER_DELETE:      {bg:'#fee2e2',color:'#991b1b'},
    SIM_CREATE:       {bg:'#f0fdf4',color:'#166534'},
    SIM_UPDATE:       {bg:'#f0fdf4',color:'#166534'},
    SIM_SHARE:        {bg:'#e0f2fe',color:'#075985'},
    SIM_DELETE:       {bg:'#fef3c7',color:'#92400e'},
    CATALOG_UPDATE:   {bg:'#ede9fe',color:'#5b21b6'},
    FORMULAS_UPDATE:  {bg:'#ede9fe',color:'#5b21b6'},
    REGIONS_UPDATE:   {bg:'#ede9fe',color:'#5b21b6'},
    SNAPSHOT_RESTORE: {bg:'#fef9c3',color:'#713f12'},
    SNAPSHOT_DELETE:  {bg:'#fee2e2',color:'#991b1b'},
    LOGS_VIEW:        {bg:'#f1f5f9',color:'#64748b'},
    LOGS_DOWNLOAD:    {bg:'#f1f5f9',color:'#64748b'},
  };
  const actionColor = a => ACTION_COLORS[a] || {bg:'#f1f5f9',color:'#374151'};

  const allActions = useMemo(() => {
    const s = new Set(lines.map(l => parseLine(l).action).filter(Boolean));
    return [...s].sort();
  }, [lines]);

  const filtered = useMemo(() => {
    const sq = search.toLowerCase();
    return [...lines].reverse().filter(l => {
      const p = parseLine(l);
      if (actionFilter && p.action !== actionFilter) return false;
      if (sq && !l.toLowerCase().includes(sq)) return false;
      return true;
    });
  }, [lines, search, actionFilter]);

  const downloadRaw = async () => {
    try {
      const r = await fetch('/api/logs/download', {headers:{'Authorization':`Bearer ${getToken()}`}});
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href=url; a.download='actions.log'; a.click();
      URL.revokeObjectURL(url);
    } catch(e) { setErrMsg(e.message); }
  };

  const exportCsv = () => {
    const header = "timestamp,ip,user,action,detail\n";
    const rows = filtered.map(l => {
      const p = parseLine(l);
      return [p.ts,p.ip,p.user,p.action,p.detail].map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(',');
    }).join('\n');
    const blob = new Blob([header+rows], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='logs.csv'; a.click();
    URL.revokeObjectURL(url);
  };

  const cols = "160px 110px 190px 160px 1fr";

  return (
    <div className="fade-in">
      <div className="card" style={{marginBottom:14,padding:"12px 16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:15,color:"var(--os-blue-dark)"}}>Journal des actions</div>
            <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2}}>
              {loading ? "Chargement…" : `${filtered.length} ligne${filtered.length!==1?"s":""} affichée${filtered.length!==1?"s":""} — ${total} au total dans le fichier`}
            </div>
          </div>
          <input className="inp" style={{width:200}} placeholder="Rechercher…"
            value={search} onChange={e=>{setSearch(e.target.value);setExpanded(null);}}/>
          <select className="sel" value={actionFilter}
            onChange={e=>{setActionFilter(e.target.value);setExpanded(null);}}>
            <option value="">Toutes les actions</option>
            {allActions.map(a=><option key={a} value={a}>{a}</option>)}
          </select>
          <select className="sel" value={limit} onChange={e=>setLimit(+e.target.value)}>
            <option value={200}>200 lignes</option>
            <option value={500}>500 lignes</option>
            <option value={1000}>1 000 lignes</option>
            <option value={5000}>5 000 lignes</option>
          </select>
          <button className={"btn xs"+(autoRefresh?" blue":"")} title="Rafraîchissement auto (10 s)"
            onClick={()=>setAutoRefresh(v=>!v)}>{autoRefresh?"⏸ Auto":"▶ Auto"}</button>
          <button className="btn xs ghost" onClick={load} title="Actualiser">↺</button>
          <button className="btn xs ghost" onClick={exportCsv} title="Exporter la vue filtrée en CSV">CSV</button>
          <button className="btn xs ghost" onClick={downloadRaw} title="Télécharger le fichier brut complet">⬇ .log</button>
        </div>
        {errMsg && <div className="err-banner" style={{marginTop:10}}>{errMsg}</div>}
      </div>

      <div className="card" style={{overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:cols,background:"var(--os-blue-dark)",padding:"8px 12px",gap:8}}>
          {["Horodatage","IP","Utilisateur","Action","Détail"].map((h,i)=>(
            <div key={i} style={{fontSize:10,fontWeight:600,color:"rgba(255,255,255,.6)",textTransform:"uppercase",letterSpacing:".06em"}}>{h}</div>
          ))}
        </div>
        <div style={{overflowY:"auto",maxHeight:"calc(100vh - 290px)"}} className="scroll">
          {loading && <div style={{padding:"20px 12px",color:"var(--text-muted)",fontSize:13}}>Chargement…</div>}
          {!loading && filtered.length===0 && (
            <div style={{padding:"24px 12px",textAlign:"center",color:"var(--text-muted)",fontSize:13}}>
              Aucune entrée{search||actionFilter ? " pour ce filtre" : " dans le journal"}.
            </div>
          )}
          {!loading && filtered.map((raw,i) => {
            const p = parseLine(raw);
            const c = actionColor(p.action);
            const isExp = expanded===i;
            return (
              <div key={i} style={{borderBottom:"1px solid var(--border)",cursor:"pointer",
                background:isExp?"var(--panel-2)":""}}
                onMouseEnter={ev=>{if(!isExp)ev.currentTarget.style.background="var(--panel-2)"}}
                onMouseLeave={ev=>{if(!isExp)ev.currentTarget.style.background=""}}
                onClick={()=>setExpanded(isExp?null:i)}>
                <div style={{display:"grid",gridTemplateColumns:cols,padding:"6px 12px",gap:8,alignItems:"center"}}>
                  <span className="mono" style={{fontSize:10,color:"var(--text-muted)"}}>
                    {p.ts.replace("T"," ").replace("Z","")}
                  </span>
                  <span className="mono" style={{fontSize:11,color:"var(--text-dim)"}}>{p.ip}</span>
                  <span style={{fontSize:12,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.user}</span>
                  <span>
                    <span style={{padding:"2px 7px",borderRadius:4,fontSize:11,fontWeight:600,
                      background:c.bg,color:c.color,whiteSpace:"nowrap"}}>{p.action}</span>
                  </span>
                  <span style={{fontSize:12,color:"var(--text-dim)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.detail}</span>
                </div>
                {isExp && (
                  <div style={{padding:"6px 12px 10px",borderTop:"1px solid var(--border)",background:"var(--os-blue-pale)"}}>
                    <code style={{fontSize:11,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",wordBreak:"break-all",lineHeight:1.6}}>{raw}</code>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

            <div key={s.id} style={{display:"flex",gap:10,alignItems:"center",padding:"5px 0",borderBottom:"1px solid var(--border)"}}>
              <span className="mono" style={{fontSize:11,color:"var(--text-muted)",flexShrink:0}}>{s.at?.slice(0,16).replace("T"," ")}</span>
              <span style={{fontSize:11,fontWeight:600,color:"var(--os-blue)",flexShrink:0,minWidth:60}}>{s.kind}</span>
              <span style={{fontSize:12,color:"var(--text-dim)"}}>{s.comment}</span>
            </div>
          ))}
          {info.hist.length===0 && <div style={{fontSize:12,color:"var(--text-muted)"}}>Aucun snapshot pour l'instant.</div>}
        </div>
        <div className="card" style={{padding:"16px 20px"}}>
          <div style={{fontWeight:700,fontSize:15,color:"var(--os-blue-dark)",marginBottom:8}}>Dernières actions</div>
          {recentLogs.slice(0,7).map((raw,i)=>{
            const p = parseLogLine(raw);
            const col = ACTION_COLORS_MINI[p.action]||"#374151";
            return (
              <div key={i} style={{display:"flex",gap:8,alignItems:"center",padding:"5px 0",borderBottom:"1px solid var(--border)"}}>
                <span className="mono" style={{fontSize:10,color:"var(--text-muted)",flexShrink:0,minWidth:130}}>{p.ts.replace("T"," ").replace("Z","")}</span>
                <span style={{fontSize:10,fontWeight:700,color:col,flexShrink:0,minWidth:110}}>{p.action}</span>
                <span style={{fontSize:11,color:"var(--text-dim)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.user}</span>
              </div>
            );
          })}
          {recentLogs.length===0 && <div style={{fontSize:12,color:"var(--text-muted)"}}>Aucune action enregistrée.</div>}
        </div>
      </div>
    </div>
  );
}

/* ── AdminApp ── */
function AdminApp() {
  const [tab, setTab] = useState("dashboard");

  const logout = () => { localStorage.removeItem(TOKEN_KEY); window.location.reload(); };

  const tabs = [
    {k:"dashboard", l:"Dashboard"},
    {k:"catalog",   l:"Catalogue"},
    {k:"formulas",  l:"Formules RI"},
    {k:"regions",   l:"Régions"},
    {k:"users",     l:"Utilisateurs"},
    {k:"history",   l:"Historique"},
    {k:"logs",      l:"Logs"},
  ];

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <header className="adm-hdr">
        <div className="adm-hdr-inner">
          <div className="logo-wrap">
            <img src="/assets/logo-outscale-blanc.svg" alt="OUTSCALE" height="28" style={{display:"block"}}/>
            <div style={{marginTop:1}}><div className="logo-text-sub">Administration</div></div>
          </div>
        </div>
      </header>
      <div style={{flex:1,display:"flex",alignItems:"stretch"}}>
        <aside className="sidebar">
          <div className="sb-section-title">Navigation</div>
          <div className="sb-group">
            {tabs.map(t => (
              <button key={t.k} className={"sb-btn"+(tab===t.k?" on":"")} onClick={()=>setTab(t.k)}>{t.l}</button>
            ))}
          </div>
          <div style={{marginTop:"auto",paddingTop:8}}>
            <div className="sb-sep"/>
            <a href="/" className="sb-btn" style={{textDecoration:"none",textAlign:"center",display:"block",marginBottom:4}}>← Estimateur</a>
            <button className="sb-btn" onClick={logout}>Déconnexion</button>
          </div>
        </aside>
        <div style={{flex:1,minWidth:0}}>
          <main className="adm-main" style={{flex:1}}>
            {tab==="dashboard" && <Dashboard/>}
            {tab==="catalog"   && <CatalogTab/>}
            {tab==="formulas"  && <FormulasTab/>}
            {tab==="regions"   && <RegionsTab/>}
            {tab==="users"     && <UsersTab/>}
            {tab==="history"   && <HistoryTab/>}
            {tab==="logs"      && <LogsTab/>}
          </main>
        </div>
      </div>
    </div>
  );
}

/* ── Root ── */
function Root() {
  const [loggedIn, setLoggedIn] = useState(() => {
    return parseTokenRole(getToken()) === 'admin';
  });
  if (!loggedIn) return <LoginPage onLogin={()=>setLoggedIn(true)}/>;
  return <AdminApp/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
