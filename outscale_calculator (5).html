<title>OUTSCALE — Estimateur budgétaire cloud</title>

<style>
:root {
  --os-blue:#005386;--os-blue-dark:#002f4e;--os-blue-mid:#006ea8;
  --os-blue-pale:#e6f2fa;--os-blue-pale2:#f0f7fc;
  --os-orange:#f47920;--os-orange-dark:#c75f0f;--os-orange-pale:#fff4eb;
  --bg:#f2f5f9;--panel:#ffffff;--panel-2:#f7f9fb;
  --border:#dce4ec;--border-2:#c4d0db;
  --text:#1a2b3a;--text-dim:#4d6070;--text-muted:#8098ac;
  --ok:#0f7a3c;--ok-bg:#e6f5ec;--warn:#b45309;--warn-bg:#fffbeb;
  --err:#b91c1c;--err-bg:#fef2f2;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;font-size:14px;line-height:1.5}
a{color:var(--os-blue)}
.hdr{background:var(--os-blue-dark);border-bottom:3px solid var(--os-orange);position:sticky;top:0;z-index:50}
.hdr-inner{max-width:1760px;margin:0 auto;padding:0 20px;height:56px;display:flex;align-items:center;gap:10px}
.logo-wrap{display:flex;align-items:center;gap:9px;flex-shrink:0}
.logo-text-main{font-weight:700;font-size:14px;color:#fff;letter-spacing:.04em}
.logo-text-sub{font-size:10px;color:rgba(255,255,255,.5);letter-spacing:.08em;text-transform:uppercase}
.vdiv{width:1px;height:28px;background:rgba(255,255,255,.15);flex-shrink:0}
.nav-tabs{display:flex;gap:2px;background:rgba(0,0,0,.2);border-radius:8px;padding:3px}
.ntab{padding:5px 12px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;color:rgba(255,255,255,.65);transition:all .15s;white-space:nowrap;border:none;background:none;font-family:inherit}
.ntab:hover{color:#fff;background:rgba(255,255,255,.1)}
.ntab.on{color:var(--os-blue-dark);background:#fff}
.reg-btn{padding:4px 9px;border-radius:5px;font-size:11.5px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);transition:all .15s;white-space:nowrap;font-family:inherit}
.reg-btn:hover{border-color:rgba(255,255,255,.5);color:#fff}
.reg-btn.on{background:var(--os-orange);color:#fff;border-color:var(--os-orange)}
.io-btn{padding:5px 10px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:rgba(255,255,255,.85);transition:all .15s;font-family:inherit}
.io-btn:hover{background:rgba(255,255,255,.2)}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.phdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border)}
.slbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);font-weight:600;margin-bottom:3px}
.stitle{font-size:16px;font-weight:700;color:var(--os-blue-dark);letter-spacing:-.01em}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border-2);background:var(--panel);color:var(--text);transition:all .15s;font-family:inherit;white-space:nowrap}
.btn:hover{border-color:var(--os-blue);color:var(--os-blue)}
.btn.orange{background:var(--os-orange);color:#fff;border-color:var(--os-orange)}
.btn.orange:hover{background:var(--os-orange-dark);border-color:var(--os-orange-dark)}
.btn.blue{background:var(--os-blue);color:#fff;border-color:var(--os-blue)}
.btn.blue:hover{background:var(--os-blue-mid)}
.btn.ghost{background:transparent;border-color:transparent}
.btn.ghost:hover{background:var(--panel-2);border-color:var(--border)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.xs{padding:3px 8px;font-size:11px}
.btn.danger:hover{border-color:var(--err);color:var(--err);background:var(--err-bg)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.inp,.sel{width:100%;background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:7px 10px;font-size:13px;transition:border-color .15s,box-shadow .15s;font-family:inherit}
.inp:focus,.sel:focus{outline:none;border-color:var(--os-blue);box-shadow:0 0 0 3px rgba(0,83,134,.1)}
.mono{font-family:'DM Mono',monospace}
.lbl{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);font-weight:600;margin-bottom:4px}
input[type=number]::-webkit-inner-spin-button{opacity:.35}
.bdg{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.02em}
.b-comp{background:#dbeafe;color:#1e4d8c}.b-ded{background:#dbeafe;color:#1e4d8c}
.b-gpu{background:#ede9fe;color:#5b21b6}.b-oks{background:#cffafe;color:#0e7490}
.b-bsu{background:#e0f2fe;color:#075985}.b-oos{background:#e0f2fe;color:#0369a1}
.b-net{background:#d1fae5;color:#065f46}.b-lic{background:#fce7f3;color:#9d174d}
.acc{border:1px solid var(--border);border-radius:9px;margin-bottom:7px;background:var(--panel)}
.acc-hd{display:flex;align-items:center;gap:9px;padding:10px 13px;cursor:pointer;user-select:none;transition:background .1s}
.acc-hd:hover{background:var(--panel-2)}
.acc-bd{border-top:1px solid var(--border);padding:13px}
.caret{width:14px;height:14px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:9px;transition:transform .15s;flex-shrink:0}
.caret.o{transform:rotate(90deg)}
.kpi-bar{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--border)}
.kpi{padding:15px 18px}.kpi.main{background:var(--os-blue-dark)}
.kpi-v{font-size:26px;font-weight:700;letter-spacing:-.03em;line-height:1;margin-top:5px}
.kpi.main .kpi-v{color:#fff}.kpi.main .lbl{color:rgba(255,255,255,.6)}
.pvt{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
.pvt th{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;color:var(--text-dim);padding:8px 12px;border-bottom:2px solid var(--border);background:var(--panel-2);text-align:left;position:sticky;top:0;z-index:2}
.pvt th.r{text-align:right}.pvt td{padding:7px 12px;border-bottom:1px solid var(--border)}
.pvt tr.gr:hover td{background:var(--os-blue-pale2)}.pvt tr.gr td{font-weight:600;cursor:pointer}
.pvt tr.dr td{background:#fafcfe}.pvt tr.dr:hover td{background:var(--os-blue-pale2)}
.pvt td.num{font-family:'DM Mono',monospace;text-align:right;font-size:12.5px}
.pvt td.numh{font-family:'DM Mono',monospace;text-align:right;font-weight:600;color:var(--os-blue-dark);font-size:12.5px}
.pvt tr.tot td{border-top:2px solid var(--os-blue);background:var(--os-blue-pale);font-weight:700;font-size:14px}
.pvt tr.tot .numh{color:var(--os-orange-dark);font-size:15px}
.prog{height:4px;border-radius:2px;background:var(--border);overflow:hidden;flex-shrink:0}
.prog-b{height:100%;border-radius:2px;background:var(--os-orange);transition:width .35s}
/* CATALOG PAGE */
.cat-section{padding:8px 12px 4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--os-blue);background:var(--os-blue-pale);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.cat-row-grid{display:grid;grid-template-columns:minmax(220px,2fr) repeat(5,96px);background:var(--panel);border-bottom:1px solid var(--border)}
.cat-row-grid:hover{background:var(--os-blue-pale2)}
.cat-cell{padding:5px 8px;font-size:12.5px}
.cat-inp{width:88px;background:var(--panel);border:1px solid var(--border);border-radius:5px;padding:4px 6px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);transition:border-color .15s}
.cat-inp:focus{outline:none;border-color:var(--os-blue);box-shadow:0 0 0 2px rgba(0,83,134,.1)}
.cat-inp.dirty{border-color:var(--os-orange);background:var(--os-orange-pale)}
.cat-inp.fresh{border-color:var(--ok);background:var(--ok-bg)}
.warn-banner{border-left:3px solid var(--os-orange);background:var(--os-orange-pale);padding:9px 13px;border-radius:0 7px 7px 0;font-size:13px;color:#7c3700}
.info-banner{border-left:3px solid var(--os-blue);background:var(--os-blue-pale);padding:9px 13px;border-radius:0 7px 7px 0;font-size:13px;color:var(--os-blue-dark)}
.ok-banner{border-left:3px solid var(--ok);background:var(--ok-bg);padding:9px 13px;border-radius:0 7px 7px 0;font-size:13px;color:var(--ok)}
.err-banner{border-left:3px solid var(--err);background:var(--err-bg);padding:9px 13px;border-radius:0 7px 7px 0;font-size:13px;color:var(--err)}
.help h2{font-size:17px;color:var(--os-blue-dark);margin:22px 0 8px;padding-bottom:6px;border-bottom:2px solid var(--os-blue-pale)}
.help h3{font-size:13px;color:var(--os-blue);font-weight:600;margin:14px 0 5px}
.help p{margin:5px 0 10px;color:var(--text-dim);line-height:1.65}
.help li{margin:3px 0;color:var(--text-dim);line-height:1.65}
.help table{width:100%;border-collapse:collapse;font-size:13px;margin:8px 0 14px}
.help table th{background:var(--os-blue-pale);color:var(--os-blue-dark);padding:6px 10px;text-align:left;border:1px solid var(--border);font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.help table td{padding:6px 10px;border:1px solid var(--border);vertical-align:top}
.help table tr:nth-child(even) td{background:#f8fbfd}
.code{font-family:'DM Mono',monospace;background:var(--panel-2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-size:11.5px}
.scroll{scrollbar-width:thin;scrollbar-color:var(--border-2) transparent}
.scroll::-webkit-scrollbar{width:6px;height:6px}
.scroll::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:3px}
.fade-in{animation:fi .22s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.spin{animation:sp 1s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:11px;font-weight:600}
.tblue{background:var(--os-blue-pale);color:var(--os-blue)}
</style>
</head>

<script type="text/babel" data-presets="react">
const {useState,useEffect,useMemo,useRef,useCallback} = React;

const DEFAULT_C = {

const REGIONS=[
  {id:"eu-west-2",           flag:"FR", short:"EU-W2",  name:"Europe Ouest (France)"},
  {id:"cloudgouv-eu-west-1", flag:"FR", short:"GOUV",   name:"Cloud Souverain (France)"},
  {id:"us-west-1",           flag:"US", short:"US-W1",  name:"US Ouest"},

  {id:"ap-northeast-1",      flag:"JP", short:"AP-NE1", name:"Asie (Japon)"},
];
const FLAG={FR:"🇫🇷",US:"🇺🇸",JP:"🇯🇵"};
const RIDXof=id=>REGIONS.findIndex(r=>r.id===id);

const ENGAGEMENTS=[
  {id:"on-demand",       label:"A la demande",                   d:0.00},
  {id:"ri-1m-upfront",   label:"RI 1 mois upfront (-30%)",       d:0.30},
  {id:"ri-1y-upfront",   label:"RI 1 an upfront (-40%)",         d:0.40},
  {id:"ri-2y-upfront",   label:"RI 2 ans upfront (-50%)",        d:0.50},
  {id:"ri-3y-upfront",   label:"RI 3 ans upfront (-60%)",        d:0.60},
  {id:"ri-1y-quarterly", label:"RI 1 an trimestriel (-37%)",     d:0.37},
  {id:"ri-2y-quarterly", label:"RI 2 ans trimestriel (-45%)",    d:0.45},
  {id:"ri-3y-quarterly", label:"RI 3 ans trimestriel (-53%)",    d:0.53},
  {id:"ri-2y-yearly",    label:"RI 2 ans annuel (-48%)",         d:0.48},
  {id:"ri-3y-yearly",    label:"RI 3 ans annuel (-56%)",         d:0.56},
];

const GROUPS=[
  {id:"compute",          label:"Puissance de calcul",         bc:"b-comp"},
  {id:"dedicated-access", label:"Acces Dedicated",             bc:"b-ded"},
  {id:"gpu",              label:"GPU flexible",                bc:"b-gpu"},
  {id:"oks",              label:"Kubernetes Control Plane",    bc:"b-oks"},
  {id:"bsu",              label:"Stockage bloc (BSU)",         bc:"b-bsu"},
  {id:"oos",              label:"Stockage objet (OOS)",        bc:"b-oos"},
  {id:"net",              label:"Reseau",                      bc:"b-net"},
  {id:"lic",              label:"Licences",                    bc:"b-lic"},
];

const BLABELS={compute:"Compute","dedicated-access":"Dedicated",gpu:"GPU",oks:"OKS",bsu:"BSU",oos:"OOS",net:"Reseau",lic:"Licence"};
const BCLS={compute:"b-comp","dedicated-access":"b-ded",gpu:"b-gpu",oks:"b-oks",bsu:"b-bsu",oos:"b-oos",net:"b-net",lic:"b-lic"};
const HPM=730;
const UID=()=>Math.random().toString(36).slice(2,10);
const fE=(v,d=0)=>(v||0).toLocaleString("fr-FR",{minimumFractionDigits:d,maximumFractionDigits:d})+" EUR";
const fp=(v,d=4)=>parseFloat((v||0).toFixed(d));

function calcLine(line,C,regionId){
  const ri=Math.max(0,RIDXof(regionId));
  const eng=ENGAGEMENTS.find(e=>e.id===(line.engagement||"on-demand"))||ENGAGEMENTS[0];
  const disc=eng.d, usage=parseFloat(line.usage??1)||1;
  let monthly=0,detail="",group=line.type,setup=0;
  switch(line.type){
    case "compute":{
      const vt=C.vcore[line.cpu_gen]||C.vcore.v7;
      const vcUO=(vt[line.perf||"high"]||vt.high)[ri]||0;
      const perH=Number(line.vcore||0)*vcUO+Number(line.ram||0)*(C.ram[ri]||0);
      const ded=line.dedicated?1.10:1.0;
      let stoM=0;
      if(line.storage_type&&Number(line.storage_gb)>0){
        const s=C.storage[line.storage_type];
        if(s)stoM=((s.gb[ri]||0)*Number(line.storage_gb)+(s.iops[ri]||0)*Number(line.iops||0))*Number(line.qty||1);
      }
      monthly=perH*Number(line.qty||1)*HPM*usage*(1-disc)*ded+stoM;
      detail=`${line.qty}x${line.vcore}vC.${line.ram}GiB ${line.cpu_gen}/${line.perf}`+(line.dedicated?" ded":"")+` ${eng.label}`;
      break;
    }
    case "dedicated-access":
      monthly=(C.ded_fee[ri]||0)*HPM*Number(line.qty||1)*usage*(1-disc);
      detail=`${line.qty}x acces dedicated ${fE(C.ded_fee[ri]||0,3)}/h`;
      break;
    case "gpu":{
      const pa=C.gpu[line.gpu_type];
      const p=pa?(pa[ri]||0):0;
      const gDisc=Math.min(disc,0.30);
      monthly=p*Number(line.gpu_qty||0)*HPM*usage*(1-gDisc);
      detail=`${line.gpu_qty}x${line.gpu_type}`+(disc>0.30?" cap30%":"")+` ${eng.label}`;
      break;
    }
    case "oks":{
      const p=(C.oks[line.cp]||C.oks["cp.3.masters.small"])[ri]||0;
      monthly=p*HPM*Number(line.qty||1)*usage*(1-disc);
      detail=`${line.qty}x${line.cp}`;break;
    }
    case "bsu":{
      const s=C.storage[line.storage_type]||C.storage["BSU Magnetic (standard)"];
      monthly=((s.gb[ri]||0)*Number(line.storage_gb||0)+(s.iops[ri]||0)*Number(line.iops||0))*Number(line.qty||1);
      detail=`${line.qty}x${line.storage_gb}GiB ${line.storage_type}`;break;
    }
    case "oos":
      monthly=(C.oos.gb[ri]||0)*Number(line.storage_gb||0);
      detail=`${line.storage_gb}GiB`;break;
    case "net":{
      const t=line.net_type||"",q=Number(line.net_qty||0);
      if(t.startsWith("VPN"))          monthly=(C.vpn[ri]||0)*q*HPM;
      else if(t.startsWith("LBU"))     monthly=(C.lbu[ri]||0)*q*HPM;
      else if(t.startsWith("EIP"))     monthly=(C.eip[ri]||0)*q*HPM;
      else if(t.startsWith("NAT"))     monthly=(C.nat[ri]||0)*q*HPM;
      else if(t==="DirectLink 1 Gb/s (par mois)")     monthly=(C.dl_1gbps[ri]||0)*q;
      else if(t==="DirectLink 10 Gb/s (par mois)")    monthly=(C.dl_10gbps[ri]||0)*q;
      else if(t==="DirectLink - frais de mise en service")         {setup=(C.dl_setup[ri]||0)*q;monthly=0;}
      else if(t==="Hosted DirectLink - frais de mise en service")  {setup=(C.hdl_setup[ri]||0)*q;monthly=0;}
      else if(t==="Hosted DirectLink 1 Gb/s (par mois)")  monthly=(C.hdl_1gbps[ri]||0)*q;
      else if(t==="Hosted DirectLink 10 Gb/s (par mois)") monthly=(C.hdl_10gbps[ri]||0)*q;
      detail=`${q>0?q+"x":""}${t}`;break;
    }
    case "lic":{
      const l=C.lic[line.lic_type];if(!l)break;
      const p=(l.price[ri]||0),f=l.base==="h"?HPM:(l.base==="m"?1:1/12);
      monthly=p*f*Number(line.lic_qty||0);
      detail=`${line.lic_qty}x${line.lic_type}`;break;
    }
  }
  return{group,monthly,yearly:monthly*12+setup,three_year:(monthly*12+setup)*3-setup*2,setup,detail};
}

function PivotTable({lines,results,regionId}){

  const grps=useMemo(()=>{
    const g={};
    GROUPS.forEach(gd=>g[gd.id]={...gd,items:[],monthly:0,yearly:0,three_year:0});

    return Object.values(g).filter(g=>g.items.length>0);
  },[lines,results]);
  const tot=useMemo(()=>grps.reduce((a,g)=>({monthly:a.monthly+g.monthly,yearly:a.yearly+g.yearly,three_year:a.three_year+g.three_year}),{monthly:0,yearly:0,three_year:0}),[grps]);

          {[{k:"monthly",l:"Mois"},{k:"yearly",l:"Annee"},{k:"three_year",l:"3 ans"}].map(t=>(
            <button key={t.k} onClick={()=>setHz(t.k)} style={{padding:"4px 10px",borderRadius:5,border:"none",fontSize:12,fontWeight:500,cursor:"pointer",background:hz===t.k?"var(--os-blue)":"transparent",color:hz===t.k?"#fff":"var(--text-dim)",transition:"all .15s",fontFamily:"inherit"}}>{t.l}</button>

      <div style={{overflowX:"auto"}} className="scroll">
        <table className="pvt">
          <thead><tr>
            <th>Groupe / Ressource</th>
            <th className="r">Mensuel HT</th><th className="r">Annuel HT</th><th className="r">3 ans HT</th><th className="r">%</th>
          </tr></thead>
          <tbody>
            {grps.map(g=>{
              const isO=exp[g.id],pct=tot[hz]>0?g[hz]/tot[hz]*100:0;
              return(<React.Fragment key={g.id}>
                <tr className="gr" onClick={()=>setExp({...exp,[g.id]:!isO})}>

function EngBreakdown({lines,results}){

    const by={};
    lines.forEach((l,i)=>{const id=l.engagement||"...";if(!by[id]){const d=ENGAGEMENTS.find(e=>e.id===id);by[id]={id,label:d?d.label:"...",monthly:0,count:0};}by[id].monthly+=results[i].monthly;by[id].count+=1;});
    const tot=Object.values(by).reduce((s,b)=>s+b.monthly,0);
    return{items:Object.values(by).sort((a,b)=>b.monthly-a.monthly),tot};
  },[lines,results]);
  return(
    <table className="pvt">
      <thead><tr><th>Engagement</th><th className="r">Lignes</th><th className="r">Mensuel HT</th><th className="r">Part</th></tr></thead>
      <tbody>{data.items.map(it=>(
        <tr key={it.id} className="dr">
          <td style={{fontWeight:500}}>{it.label}</td>
          <td className="num">{it.count}</td>
          <td className="numh">{fE(it.monthly,2)}</td>
          <td className="num">

function App(){
  const [lines,setLines]=useState([]);
  const [region,setRegion]=useState("eu-west-2");
  const [tab,setTab]=useState("split");
  const [C,setC]=useState(()=>JSON.parse(JSON.stringify(DEFAULT_C)));
  const [loaded,setLoaded]=useState(false);
  const [filter,setFilter]=useState("");
  const [fetchStatus,setFetchStatus]=useState("idle");
  const [lastFetch,setLastFetch]=useState(null);
  const fileRef=useRef(null);

  useEffect(()=>{
    (async()=>{
      try{
        const rr=await window.storage.get("outscale:region");if(rr?.value)setRegion(rr.value);
        const rc=await window.storage.get("outscale:catalog");if(rc?.value)setC(JSON.parse(rc.value));
        const rl=await window.storage.get("outscale:lines");if(rl?.value)setLines(JSON.parse(rl.value));else setLines(DEMO);
        const rf=await window.storage.get("outscale:lastFetch");if(rf?.value)setLastFetch(rf.value);
      }catch{setLines(DEMO);}
      setLoaded(true);
    })();
  },[]);
  useEffect(()=>{if(!loaded)return;(async()=>{try{await window.storage.set("outscale:region",region);}catch{}})();},[region,loaded]);
  useEffect(()=>{if(!loaded)return;(async()=>{try{await window.storage.set("outscale:catalog",JSON.stringify(C));}catch{}})();},[C,loaded]);
  useEffect(()=>{if(!loaded)return;(async()=>{try{await window.storage.set("outscale:lines",JSON.stringify(lines.map(({_open,...r})=>r)));}catch{}})();},[lines,loaded]);

  const results=useMemo(()=>lines.map(l=>calcLine(l,C,region)),[lines,C,region]);
  const totalM=useMemo(()=>results.reduce((s,r)=>s+r.monthly,0),[results]);

  const updLine=useCallback((id,nl)=>setLines(ls=>ls.map(l=>l.id===id?nl:l)),[]);
  const delLine=useCallback((id)=>setLines(ls=>ls.filter(l=>l.id!==id)),[]);
  const dupLine=useCallback((id)=>setLines(ls=>{const s=ls.find(l=>l.id===id);return s?[...ls,{...s,id:UID(),desc:(s.desc||"")+" (copie)",_open:true}]:ls;}),[]);
  const addLine=useCallback((l)=>setLines(ls=>[...ls,l]),[]);

  const exportJson=()=>{
    const blob=new Blob([JSON.stringify({lines:lines.map(({_open,...r})=>r),catalog:C},null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="outscale-estimation.json";a.click();URL.revokeObjectURL(url);
  };
  const importJson=(file)=>{
    const rd=new FileReader();
    rd.onload=()=>{try{const d=JSON.parse(rd.result);if(d.lines)setLines(d.lines.map(x=>({...x,id:x.id||UID()})));if(d.catalog)setC(d.catalog);}catch{alert("JSON invalide.");}};
    rd.readAsText(file);
  };

  /* FETCH TARIFS via API Claude avec web_search */
  const fetchPricing=async()=>{
    setFetchStatus("loading");
    try{
      const PROMPT=`Tu es un extracteur de donnees de tarification cloud.
Utilise l'outil web_search pour recuperer le contenu de https://fr.outscale.com/tarifs/ puis extrait tous les tarifs.

Reponds UNIQUEMENT avec un objet JSON valide (aucun texte avant ou apres, pas de backticks markdown) respectant exactement ce schema :
L'ordre des 5 regions est TOUJOURS: eu-west-2, cloudgouv-eu-west-1, us-west-1, us-east-2, ap-northeast-1.
Si un prix est N/A ou non disponible: utilise 0. Nombres flottants uniquement (ex: 0.038 pas "0,038").

{"ram":[5 valeurs],"ded_fee":[5 valeurs],"vcore":{"v7":{"medium":[5],"high":[5],"highest":[5]},"v6":{"medium":[5],"high":[5],"highest":[5]},"v5":{"medium":[5],"high":[5],"highest":[5]},"v4":{"medium":[5],"high":[5],"highest":[5]},"v3":{"medium":[5],"high":[5],"highest":[5]},"v2":{"medium":[5],"high":[5],"highest":[5]},"v1":{"medium":[5],"high":[5],"highest":[5]}},"gpu":{"Nvidia K2":[5],"Nvidia P6":[5],"Nvidia P100":[5],"Nvidia V100":[5],"Nvidia A100-40":[5],"Nvidia A100-80":[5],"Nvidia A10":[5],"Nvidia L40":[5],"Nvidia H100":[5],"Nvidia H200":[5]},"oks":{"cp.mono.master":[5],"cp.3.masters.small":[5],"cp.3.masters.medium":[5],"cp.3.masters.large":[5]},"storage":{"BSU Magnetic (standard)":{"gb":[5],"iops":[0,0,0,0,0]},"BSU Performance (gp2)":{"gb":[5],"iops":[0,0,0,0,0]},"BSU Enterprise (io1)":{"gb":[5],"iops":[5]},"Snapshots":{"gb":[5],"iops":[0,0,0,0,0]}},"oos":{"gb":[5]},"vpn":[5],"nat":[5],"lbu":[5],"eip":[5],"dl_setup":[5],"dl_1gbps":[5],"dl_10gbps":[5],"hdl_setup":[5],"hdl_1gbps":[5],"hdl_10gbps":[5],"lic":{"Windows Server 2019/2022 (pack 2 coeurs - jusqu'a 2 VMs)":{"base":"h","price":[5]},"Microsoft SQL Server 2019 - Web Edition (pack 2 coeurs)":{"base":"h","price":[5]},"Microsoft SQL Server 2019 - Standard (pack 2 coeurs)":{"base":"h","price":[5]},"Microsoft SQL Server 2019 - Enterprise (pack 2 coeurs)":{"base":"h","price":[5]},"Red Hat Enterprise Linux (1 licence par vCore)":{"base":"h","price":[5]},"Oracle Linux OS (par VM)":{"base":"h","price":[5]},"Red Hat Enterprise Linux OS (par VM)":{"base":"h","price":[5]},"Windows 10 E3 VDA (par VM)":{"base":"h","price":[5]}}}`;

      const resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:3000,
          tools:[{type:"web_search_20250305",name:"web_search"}],
          messages:[{role:"user",content:PROMPT}]
        })
      });
      const data=await resp.json();
      if(!resp.ok)throw new Error(data.error?.message||"API error");

      const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
      const clean=text.replace(/```json\s*/gi,"").replace(/```\s*/gi,"").trim();
      
      // Trouver le JSON dans la reponse
      const jsonStart=clean.indexOf("{");
      const jsonEnd=clean.lastIndexOf("}");
      if(jsonStart===-1||jsonEnd===-1)throw new Error("No JSON found");
      const parsed=JSON.parse(clean.slice(jsonStart,jsonEnd+1));

      // Merger deep
      const merge=(target,src)=>{
        for(const k of Object.keys(src)){
          if(typeof src[k]==="object"&&!Array.isArray(src[k])&&src[k]!==null){
            if(!target[k])target[k]={};
            merge(target[k],src[k]);
          }else{target[k]=src[k];}
        }
      };
      const merged=JSON.parse(JSON.stringify(C));
      merge(merged,parsed);
      setC(merged);
      const now=new Date().toLocaleString("fr-FR");
      setLastFetch(now);
      await window.storage.set("outscale:lastFetch",now);
      setFetchStatus("ok");
      setTimeout(()=>setFetchStatus("idle"),10000);
    }catch(e){
      console.error("Fetch pricing error:",e);
      setFetchStatus("error");
      setTimeout(()=>setFetchStatus("idle"),8000);
    }
  };

  const filtered=filter?lines.filter(l=>(filter==="compute"?(l.type==="compute"||l.type==="dedicated-access"):l.type===filter)):lines;

  if(!loaded)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:"var(--text-muted)"}}>Chargement...</div>;

  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <header className="hdr">
        <div className="hdr-inner">
          <div className="logo-wrap">
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {/* Logo officiel chargé depuis le CDN Outscale, avec fallback SVG */}
              <img
                src="https://outscale-1eecc.kxcdn.com/wp-content/uploads/2024/01/Logo-OUTSCALE-blanc.svg"
                alt="OUTSCALE"
                height="26"
                style={{display:"block"}}
                onError={(e)=>{
                  e.currentTarget.replaceWith((() => {
                    const s = document.createElementNS('http://www.w3.org/2000/svg','svg');
                    s.setAttribute('viewBox','0 0 210 38');
                    s.setAttribute('height','28');
                    s.innerHTML = '<text x="0" y="28" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="26" letter-spacing="2.5" fill="white">OUTSCALE</text><path d="M183 3 C192 3 207 10 207 19 C207 28 192 35 183 35" stroke="#f47920" stroke-width="5" fill="none" stroke-linecap="round"/>';
                    return s;
                  })());
                }}
              />
            </div>
            <div style={{marginTop:1}}>
              <div className="logo-text-sub">Cloud Estimator</div>
            </div>
          </div>

          <div className="vdiv"/>

          <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
            <span style={{fontSize:10,color:"rgba(255,255,255,.4)",textTransform:"uppercase",letterSpacing:".06em",marginRight:4}}>Region</span>
            {REGIONS.map(r=>(
              <button key={r.id} className={"reg-btn"+(region===r.id?" on":"")} onClick={()=>setRegion(r.id)} title={r.name}>
                {FLAG[r.flag]} {r.short}
              </button>
            ))}
          </div>

          <div style={{flex:1}}/>

          <nav className="nav-tabs">
            <div className={"ntab"+(tab==="split"?" on":"")}  onClick={()=>setTab("split")}>Cote a cote</div>
            <div className={"ntab"+(tab==="input"?" on":"")}  onClick={()=>setTab("input")}>Saisie</div>
            <div className={"ntab"+(tab==="view"?" on":"")}   onClick={()=>setTab("view")}>Synthese</div>
            <div className={"ntab"+(tab==="catalog"?" on":"")} onClick={()=>setTab("catalog")}>Tarifs</div>
            <div className={"ntab"+(tab==="help"?" on":"")}   onClick={()=>setTab("help")}>Aide</div>
          </nav>

          <div className="vdiv"/>

          <div style={{display:"flex",gap:5,flexShrink:0}}>
            <input ref={fileRef} type="file" accept="application/json" style={{display:"none"}} onChange={e=>{if(e.target.files[0])importJson(e.target.files[0]);}}/>
            <button className="io-btn" onClick={()=>fileRef.current.click()}>Importer</button>
            <button className="io-btn" onClick={exportJson}>Exporter</button>
          </div>
        </div>
      </header>

      <main style={{flex:1,maxWidth:1760,width:"100%",margin:"0 auto",padding:"16px 20px",display:"flex",flexDirection:"column",gap:14}}>

        {tab!=="help"&&tab!=="catalog"&&(
          <div className="warn-banner">
            <strong>Estimation indicative HT</strong> - Tarifs Outscale {lastFetch?`(sync. ${lastFetch})`:"(v57, mars 2025)"} - region <strong>{region}</strong>.
            <a href="https://fr.outscale.com/tarifs/" target="_blank" rel="noreferrer" style={{marginLeft:8,color:"#7c3700"}}>Tarifs officiels</a>
          </div>
        )}

        {tab==="help"&&<HelpPage/>}
        {tab==="catalog"&&<CatalogPage C={C} onUpdate={setC} fetchStatus={fetchStatus} onFetch={fetchPricing} lastFetch={lastFetch}/>}

        {(tab==="split"||tab==="input"||tab==="view")&&(
          <div style={{display:"grid",gridTemplateColumns:tab==="split"?"1fr 1fr":"1fr",gap:14,alignItems:"start"}}>

            {(tab==="split"||tab==="input")&&(
              <div className="card">
                <div className="phdr">
                  <div>
                    <div className="slbl">Hypotheses de consommation</div>
                    <div className="stitle">Ressources consommees</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div className="mono" style={{fontSize:18,fontWeight:700,color:"var(--os-orange-dark)"}}>{fE(totalM)}</div>
                    <div style={{fontSize:10,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:".05em"}}>/mois</div>
                  </div>
                </div>

                <div style={{display:"flex",flexWrap:"wrap",gap:4,padding:"8px 14px",borderBottom:"1px solid var(--border)",alignItems:"center"}}>
                  <span style={{fontSize:11,color:"var(--text-muted)",marginRight:2}}>Afficher :</span>
                  <button className={"btn xs"+(filter===""?" blue":"")} onClick={()=>setFilter("")}>Tout ({lines.length})</button>
                  {[{id:"compute",l:"Compute"},{id:"gpu",l:"GPU"},{id:"oks",l:"OKS"},{id:"bsu",l:"BSU"},{id:"oos",l:"OOS"},{id:"net",l:"Reseau"},{id:"lic",l:"Licences"}].map(f=>{
                    const n=lines.filter(l=>(f.id==="compute"?(l.type==="compute"||l.type==="dedicated-access"):l.type===f.id)).length;
                    if(!n)return null;
                    return<button key={f.id} className={"btn xs"+(filter===f.id?" blue":"")} onClick={()=>setFilter(filter===f.id?"":f.id)}>{f.l} ({n})</button>;
                  })}
                  <div style={{flex:1}}/>
                  <button className="btn xs ghost" onClick={()=>{if(confirm("Charger les donnees de demo ?"))setLines(DEMO);}}>Demo</button>
                  <button className="btn xs ghost danger" onClick={()=>{if(confirm("Supprimer toutes les lignes ?"))setLines([]);}}>Vider</button>
                </div>

                <div style={{padding:10,maxHeight:"calc(100vh - 265px)",overflowY:"auto"}} className="scroll">
                  {filtered.length===0?(
                    <div style={{textAlign:"center",padding:"28px 0",color:"var(--text-muted)"}}>
                      <div style={{fontSize:34,marginBottom:6}}>0</div>
                      <div style={{fontSize:13}}>Aucune ressource{filter?" dans cette categorie":""}.</div>
                    </div>
                  ):filtered.map(l=>(
                    <LineEditor key={l.id} line={l} C={C} regionId={region}
                      onChange={nl=>updLine(l.id,nl)}
                      onDelete={()=>delLine(l.id)}
                      onDuplicate={()=>dupLine(l.id)}/>
                  ))}
                  <div style={{marginTop:6}}><AddMenu onAdd={addLine} C={C}/></div>
                </div>
              </div>
            )}

            {(tab==="split"||tab==="view")&&(
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <PivotTable lines={lines} results={results} regionId={region}/>
                <div className="card">
                  <div className="phdr"><div><div className="slbl">Analyse</div><div className="stitle">Par engagement</div></div></div>
                  <div style={{padding:10}}><EngBreakdown lines={lines} results={results}/></div>
                </div>
                <div className="card">
                  <div className="phdr">
                    <div><div className="slbl">Toutes regions</div><div className="stitle">Comparaison regionale</div></div>
                    <span className="tag tblue">{FLAG[REGIONS.find(r=>r.id===region)?.flag]} {region}</span>
                  </div>
                  <div style={{padding:"12px 16px"}}><RegionComp lines={lines} C={C}/></div>
                  <div style={{padding:"0 16px 12px",fontSize:11,color:"var(--text-muted)"}}>Meme configuration, tarifs de chaque region avec le catalogue actif.</div>
                </div>
              </div>
            )}
          </div>
        )}

        <footer style={{borderTop:"1px solid var(--border)",paddingTop:10,display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--text-muted)"}}>
          <span>Outscale Cloud Estimator - base sur outscale_cloud_calculator_v57.xlsx - <a href="https://fr.outscale.com/tarifs/" target="_blank" rel="noreferrer">fr.outscale.com/tarifs</a>{lastFetch?` - sync. ${lastFetch}`:""}</span>
          <span className="mono">{lines.length} ligne{lines.length!==1?"s":""} - {region}</span>
        </footer>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
